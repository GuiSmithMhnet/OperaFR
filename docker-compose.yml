version: "3.9"

services:
  db:
    image: postgres:18-alpine
    container_name: operafr-db
    restart: unless-stopped
    networks:
     - operafr-network
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_HOST_PORT}:${POSTGRES_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: operafr-app
    networks:
     - kanban-shared-services
     - operafr-network
    working_dir: /app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "2111:2111"
      - "5555:5555"
      - "5556:5556"
    volumes:
    - ./:/app
    - /app/node_modules

volumes:
  postgres_data:
networks:
  kanban-shared-services:
    external: true
  operafr-network:
    driver: bridge
